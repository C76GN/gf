name: Release

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Extract release notes
        run: >
          python tools/extract_release_notes.py
          --tag "${GITHUB_REF_NAME}"
          --output release-notes.md

      - name: Validate release metadata
        run: >
          python tools/gf_maintenance.py release-status
          --version "${GITHUB_REF_NAME}"

      - name: Build documentation
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r docs/requirements.txt
          python tools/generate_api_reference.py --check
          python tools/check_docs_quality.py --strict
          python -m mkdocs build --strict

      - name: Build Asset Store package
        run: >
          python tools/build_asset_store_package.py
          --version "${GITHUB_REF_NAME}"
          --output "build/gf-framework-${GITHUB_REF_NAME}.zip"

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh release create "${GITHUB_REF_NAME}"
          "build/gf-framework-${GITHUB_REF_NAME}.zip"
          --verify-tag
          --title "${GITHUB_REF_NAME}"
          --notes-file release-notes.md
