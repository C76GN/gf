site_name: GF Framework
site_description: Godot 4 lightweight game architecture framework.
site_url: !ENV [READTHEDOCS_CANONICAL_URL, "https://gf-framework.readthedocs.io/"]
repo_url: https://github.com/C76GN/gf-framework
repo_name: C76GN/gf-framework
docs_dir: docs/zh
site_dir: site

theme:
  name: material
  language: zh
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: blue

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

